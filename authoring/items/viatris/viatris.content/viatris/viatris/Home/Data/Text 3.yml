        <div class="ck-content"><section style="background:#f5f3f7;box-sizing:border-box;color:#2A276E;font-family:'Source Sans 3',Arial,Helvetica,sans-serif;padding:90px 0;width:100%;"><div style="box-sizing:border-box;margin:0 auto;max-width:1240px;padding:0 32px;"><h2 style="font-family:Georgia,'Times New Roman',serif;font-size:clamp(2rem,4vw,3rem);font-style:italic;font-weight:300;line-height:1.15;margin:0 0 16px;">Découvrez Viatris</h2><div style="background:#703E97;height:4px;margin:0 0 48px;width:72px;"></div><div style="box-sizing:border-box;display:grid;gap:40px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-bottom:80px;"><div><h3 style="font-size:1.25rem;font-weight:700;margin:0 0 16px;">À propos de nous</h3><p style="font-size:1rem;line-height:1.6;margin:0 0 20px;">Nous répondons aux besoins des patients partout dans le monde en agissant avec détermination, ingéniosité et résolution. Nous offrons des solutions efficaces à grande échelle et conçues pour durer.</p><a href="https://www.viatris.com/fr/about-us" style="color:#703E97;font-weight:600;text-decoration:none;">En savoir plus sur nous →</a></div><div><h3 style="font-size:1.25rem;font-weight:700;margin:0 0 16px;">Notre pipeline</h3><p style="font-size:1rem;line-height:1.6;margin:0 0 20px;">Un pipeline en croissance qui répond à des besoins médicaux importants dans un large éventail de domaines thérapeutiques.</p><a href="https://www.viatris.com/fr/science-and-medicine/pipeline" style="color:#703E97;font-weight:600;text-decoration:none;">Parcourir notre pipeline →</a></div><div><h3 style="font-size:1.25rem;font-weight:700;margin:0 0 16px;">Nos produits</h3><p style="font-size:1rem;line-height:1.6;margin:0 0 20px;">Un portefeuille mondial dynamique de médicaments génériques, de marques établies et de médicaments innovants.</p><a href="https://www.viatris.com/fr/products" style="color:#703E97;font-weight:600;text-decoration:none;">Explorer nos produits →</a></div></div><div style="align-items:center;box-sizing:border-box;display:grid;gap:48px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));"><figure style="margin:0;"><img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&amp;fit=crop&amp;w=900&amp;q=80" alt="Professionnelle au travail" style="border-radius:4px;display:block;height:100%;max-height:420px;object-fit:cover;width:100%;" /></figure><div><h2 style="font-family:Georgia,'Times New Roman',serif;font-size:clamp(2rem,4vw,3rem);font-style:italic;font-weight:300;line-height:1.15;margin:0 0 16px;">Découvrez votre carrière chez Viatris</h2><div style="background:#703E97;height:4px;margin:0 0 28px;width:72px;"></div><p style="font-size:1.05rem;line-height:1.65;margin:0 0 32px;max-width:48ch;">Notre approche centrée sur les personnes fait de Viatris bien plus qu'un lieu de travail : un endroit où apprendre, évoluer et avoir un impact dans le monde.</p><a href="https://www.viatris.com/fr/careers" style="align-items:center;background:#703E97;border-radius:2px;box-sizing:border-box;color:#fff;display:inline-flex;font-size:1rem;font-weight:600;gap:10px;min-height:52px;padding:0 28px;text-decoration:none;">Trouvez votre prochain rôle →</a></div></div></div></section></div>
