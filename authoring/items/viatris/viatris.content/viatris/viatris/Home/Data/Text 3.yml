        <div class="ck-content"><section style="background:#f5f3f7;box-sizing:border-box;color:#2A276E;font-family:'Source Sans 3',Arial,Helvetica,sans-serif;padding:90px 0;width:100%;"><div style="box-sizing:border-box;margin:0 auto;max-width:1240px;padding:0 32px;"><h2 style="font-family:Georgia,'Times New Roman',serif;font-size:clamp(2rem,4vw,3rem);font-style:italic;font-weight:300;line-height:1.15;margin:0 0 16px;">Get to know Viatris</h2><div style="background:#703E97;height:4px;margin:0 0 48px;width:72px;"></div><div style="box-sizing:border-box;display:grid;gap:40px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-bottom:80px;"><div><h3 style="font-size:1.25rem;font-weight:700;margin:0 0 16px;">About Us</h3><p style="font-size:1rem;line-height:1.6;margin:0 0 20px;">We meet the needs of patients around the world by acting decisively with ingenuity and resolve. Whether we're developing new or more affordable medicines, ensuring a resilient supply of needed therapies, or pursuing bold innovation, we deliver solutions that are effective at scale and built to endure.</p><a href="https://www.viatris.com/en/about-us" style="color:#703E97;font-weight:600;text-decoration:none;">See more about us →</a></div><div><h3 style="font-size:1.25rem;font-weight:700;margin:0 0 16px;">Our Pipeline</h3><p style="font-size:1rem;line-height:1.6;margin:0 0 20px;">Developing a growing pipeline that addresses areas of significant unmet need across a broad range of therapeutic areas.</p><a href="https://www.viatris.com/en/science-and-medicine/pipeline" style="color:#703E97;font-weight:600;text-decoration:none;">Browse our pipeline →</a></div><div><h3 style="font-size:1.25rem;font-weight:700;margin:0 0 16px;">Our Products</h3><p style="font-size:1rem;line-height:1.6;margin:0 0 20px;">A dynamic global portfolio of medicines spanning generics, established brands and innovative medicines.</p><a href="https://www.viatris.com/en/products" style="color:#703E97;font-weight:600;text-decoration:none;">Explore our products →</a></div></div><div style="align-items:center;box-sizing:border-box;display:grid;gap:48px;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));"><figure style="margin:0;"><img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&amp;fit=crop&amp;w=900&amp;q=80" alt="Professional at work" style="border-radius:4px;display:block;height:100%;max-height:420px;object-fit:cover;width:100%;" /></figure><div><h2 style="font-family:Georgia,'Times New Roman',serif;font-size:clamp(2rem,4vw,3rem);font-style:italic;font-weight:300;line-height:1.15;margin:0 0 16px;">Discover your career at Viatris</h2><div style="background:#703E97;height:4px;margin:0 0 28px;width:72px;"></div><p style="font-size:1.05rem;line-height:1.65;margin:0 0 32px;max-width:48ch;">Our people-first mindset makes Viatris more than just a place to work, but somewhere you can learn, grow and make an impact in the world.</p><a href="https://www.viatris.com/en/careers" style="align-items:center;background:#703E97;border-radius:2px;box-sizing:border-box;color:#fff;display:inline-flex;font-size:1rem;font-weight:600;gap:10px;min-height:52px;padding:0 28px;text-decoration:none;">Find your next role →</a></div></div></div></section></div>
