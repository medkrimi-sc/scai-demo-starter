        <div class="ck-content"><h3>Don’t have a joint report form in your vehicle?</h3><p><strong>Be sure to write down the following information about the other driver:</strong></p><ul><li>Name</li><li>Address</li><li>Telephone number</li><li>Driver’s licence number</li><li>Vehicle registration certificate number</li><li>Insurer’s name, contact details, and policy number</li></ul><p>You should also write down a description of the facts. Then send this information to your insurer.</p><p><strong>Tip:</strong> A joint report can also be filled out online <a href="https://infoassurance.ca/en/joint-report" target="_blank" rel="noopener noreferrer" title="here">here</a>.</p><h3>Where to get a joint report form?</h3><p><strong>You can get a free joint report form from the Groupement des assureurs automobile (GAA):</strong></p><ul><li>By calling <a href="tel:+18772884321">1-877-288-4321</a> or online <a href="https://infoassurance.ca/en/joint-report" target="_blank" rel="noopener noreferrer" title="here">here</a>.</li></ul><h3>If anyone is injured</h3><p>If you are involved in an accident and someone is injured, call <a href="tel:911">9-1-1</a> immediately.</p><h3>Crash involving a parked vehicle</h3><p>If you hit a parked vehicle and are able to identify the driver, fill out a joint report and send it to your insurer.</p><h3>Crash involving an unoccupied vehicle or object</h3><p>If you hit an unoccupied vehicle or other object, you only need to contact the police if damage has been caused to a third party, such as another vehicle or someone else’s property. In this case, provide your identification information along with information about the other vehicle or damaged object, if applicable.</p><p>If the damage is only to your own vehicle, it is not necessary to notify the police.</p></div>
