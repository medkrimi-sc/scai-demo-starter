      Value: Download the Alaris app from the App Store or Google Play, or visit the AlarisConnect+ portal on our website. Sign up using your email and vehicle identification number (VIN). Once verified, you can manage your vehicle, schedule test drives and service, receive software updates, and access DriveSense AI and other connected features.
