        <div class="ck-content"><style>
        .ia-footer{background:#fff;padding:48px 0 0;border-top:1px solid #d0d5dd;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#1a1a1a}
        .ia-footer *,.ia-footer *::before,.ia-footer *::after{box-sizing:border-box;margin:0;padding:0}
        .ia-footer-inner{max-width:1280px;margin:0 auto;padding:0 32px}
        .ia-footer-top{display:grid;grid-template-columns:260px 1fr auto;gap:0 48px;align-items:start}
        /* NAV */
        .ia-footer-nav{display:flex;flex-direction:column}
        .ia-footer-nav a{font-size:18px;font-weight:700;color:#0a2240;text-decoration:none;padding:18px 0;border-bottom:1px solid #d0d5dd;display:block;transition:color .2s}
        .ia-footer-nav a:first-child{border-top:1px solid #d0d5dd}
        .ia-footer-nav a:hover{color:#1a5ca8}
        /* ACTIONS */
        .ia-footer-actions{display:flex;flex-direction:column;gap:26px;padding-top:4px}
        .ia-footer-actions a{display:flex;align-items:center;gap:10px;color:#0a2240;text-decoration:none;font-size:15px;font-weight:500;line-height:1.3;transition:color .2s}
        .ia-footer-actions a:hover{color:#1a5ca8}
        .ia-footer-actions svg{width:20px;height:20px;flex-shrink:0}
        /* APP CARD */
        .ia-footer-app-card{background:#e8f1fb;border-radius:12px;padding:24px 28px 28px;min-width:300px;max-width:360px}
        .ia-footer-app-card p{font-size:15px;font-weight:700;color:#0a2240;line-height:1.4;margin-bottom:12px}
        .ia-discover-link{display:inline-flex;align-items:center;gap:5px;color:#1a5ca8;font-size:14px;font-weight:600;text-decoration:none;margin-bottom:18px}
        .ia-discover-link:hover{text-decoration:underline}
        .ia-discover-link svg{width:16px;height:16px}
        .ia-footer-app-card h4{font-size:14px;font-weight:700;color:#0a2240;margin-bottom:14px}
        .ia-store-badges{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
        .ia-store-badge{display:inline-flex;align-items:center;text-decoration:none;border-radius:7px;overflow:hidden;height:40px}
        .ia-store-badge svg{height:40px;width:auto;display:block}
        /* LEGAL */
        .ia-footer-legal{margin-top:48px;padding-top:24px;border-top:1px solid #d0d5dd}
        .ia-footer-legal-links{display:flex;flex-wrap:wrap;gap:4px 0;list-style:none;padding:0}
        .ia-footer-legal-links li{display:flex;align-items:center}
        .ia-footer-legal-links a{color:#1a5ca8;font-size:14px;text-decoration:none;padding:4px 12px;white-space:nowrap}
        .ia-footer-legal-links a:hover{text-decoration:underline}
        .ia-footer-legal-links li+li::before{content:'';display:block;width:1px;height:14px;background:#d0d5dd;flex-shrink:0}
        .ia-ext-icon{display:inline-flex;vertical-align:middle;margin-left:3px;width:12px;height:12px}
        /* SOCIAL */
        .ia-footer-social{margin-top:28px;display:flex;gap:22px;align-items:center;padding-bottom:40px}
        .ia-footer-social a{color:#0a2240;display:flex;align-items:center;justify-content:center;transition:color .2s,transform .2s;text-decoration:none}
        .ia-footer-social a:hover{color:#1a5ca8;transform:translateY(-2px)}
        .ia-footer-social svg{width:26px;height:26px;display:block}
        /* BOTTOM */
        .ia-footer-bottom{background:#f0f2f5;padding:40px 32px 28px}
        .ia-footer-bottom-inner{max-width:1280px;margin:0 auto}
        .ia-footer-tagline{font-size:28px;font-weight:700;color:#1a5ca8;margin-bottom:16px;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
        .ia-footer-copyright{font-size:13px;color:#555;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
        @media(max-width:1024px){
          .ia-footer-top{grid-template-columns:220px 1fr}
          .ia-footer-app-card{grid-column:1/-1;max-width:100%;min-width:unset;margin-top:32px}
        }
        @media(max-width:768px){
          .ia-footer-inner{padding:0 20px}
          .ia-footer-top{grid-template-columns:1fr}
          .ia-footer-actions{padding-top:28px;gap:20px}
          .ia-footer-app-card{margin-top:28px}
          .ia-footer-legal-links li+li::before{display:none}
          .ia-footer-legal-links a{padding:4px 10px 4px 0}
          .ia-footer-social{gap:16px;flex-wrap:wrap}
          .ia-footer-tagline{font-size:22px}
          .ia-footer-bottom{padding:32px 20px 24px}
        }
        @media(max-width:480px){
          .ia-store-badges{flex-direction:column;align-items:flex-start}
          .ia-store-badge img{height:44px}
        }
